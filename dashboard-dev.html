<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi AI Dashboard (Dev)</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <div class="topbar-title">
          <h1>Multi AI</h1>
          <p data-i18n="topbarSubtitle"></p>
        </div>
        <div class="topbar-actions">
<button id="openSettings" data-i18n="settings"></button>
        </div>
      </header>

      <section class="settings-inline" id="settingsPanel" hidden>
        <div class="settings-card">
          <header>
            <h2 data-i18n="settingsTitle"></h2>
            <div class="settings-controls">
               <label>
                 <span>Rows</span>
                 <input type="number" id="settingRows" min="1" max="4" value="2">
               </label>
               <label>
                 <span>Cols</span>
                 <input type="number" id="settingCols" min="1" max="6" value="3">
               </label>
            </div>
            <p data-i18n="settingsSubtitle" style="display:none"></p>
          </header>
          <div class="picker-list" id="pickerList"></div>
          <footer>
            <button id="pickerCancel" data-i18n="cancel"></button>
            <button id="pickerConfirm" class="primary" data-i18n="confirm"></button>
          </footer>
        </div>
      </section>
<main class="grid" id="panelGrid"></main>

      <footer class="composer">
        <div class="composer-left">
          <label for="prompt" data-i18n="composerLabel"></label>
          <textarea id="prompt" data-i18n-attr="placeholder" data-i18n="composerPlaceholder"></textarea>
          <div class="composer-hint" id="shortcutHint"></div>
        </div>
        <div class="composer-right">
          <button id="sendAll" class="primary" data-i18n="sendAll">
            <span>Send</span>
          </button>
        </div>
      </footer>
    </div>

    <template id="panelTemplate">
      <section class="panel">
        <div class="panel-header">
          <div class="panel-title"></div>
          <span class="panel-badge"></span>
        </div>
        <div class="panel-body">
          <iframe class="panel-frame" allow="clipboard-read; clipboard-write"></iframe>
        </div>
        <div class="panel-menu">
          <button data-action="refresh" data-i18n="refresh"></button>
          <button data-action="newtab" data-i18n="newTab"></button>
          <button data-action="close" data-i18n="close"></button>
          <button data-action="switch" data-i18n="switch"></button>
          <button data-action="add" data-i18n="add"></button>
        </div>
      </section>
    </template>

    <script src="chrome-shim.js"></script>
    <script src="providers.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
