<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi AI Dashboard</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="app" id="app">
      <header class="topbar">
        <div class="topbar-title">
          <h1>Multi AI</h1>
          <p data-i18n="topbarSubtitle"></p>
        </div>
        <div class="topbar-actions">
          <button id="langToggle" class="icon-btn" data-i18n="langToggleTitle" data-i18n-attr="title,aria-label" type="button">
            <span data-i18n="langBtn"></span>
          </button>
          <button id="openSettings" data-i18n="settings"></button>
        </div>
      </header>

      <section class="settings-inline" id="settingsPanel" hidden>
        <div class="settings-card">
          <header>
            <h2 data-i18n="settingsTitle"></h2>
            <div class="settings-controls">
               <div class="setting-control">
                 <span data-i18n="settingsColumns"></span>
                 <div class="stepper">
                   <button type="button" id="colDec">-</button>
                   <span id="colDisplay">Auto</span>
                   <button type="button" id="colInc">+</button>
                 </div>
               </div>
               <button id="toggleSelectAll" type="button" data-i18n="selectToggle"></button>
            </div>
            <p data-i18n="settingsSubtitle" style="display:none"></p>
          </header>
          <div class="picker-list" id="pickerList"></div>
          <footer>
            <button id="pickerCancel" data-i18n="cancel"></button>
            <button id="pickerConfirm" class="primary" data-i18n="confirm"></button>
          </footer>
        </div>
      </section>
      <section class="workspace" id="workspaceLayout">
        <main class="grid" id="panelGrid"></main>
        <aside class="transcript-panel" id="transcriptPanel" hidden>
          <header class="transcript-panel-header">
            <div class="transcript-panel-heading">
              <h2 data-i18n="transcriptTitle"></h2>
              <p class="transcript-panel-meta" id="transcriptSessionMeta"></p>
            </div>
            <button id="transcriptRefresh" class="transcript-refresh-btn" type="button" data-i18n="transcriptRefresh"></button>
          </header>

          <div class="transcript-panel-body">
            <section class="transcript-section">
              <div class="transcript-section-header">
                <h3 data-i18n="transcriptStatusTitle"></h3>
                <span class="transcript-section-meta" id="transcriptUpdatedAt"></span>
              </div>
              <div class="transcript-status-list" id="transcriptStatusList"></div>
            </section>

            <section class="transcript-section">
              <div class="transcript-section-header">
                <h3 data-i18n="transcriptTimelineTitle"></h3>
                <div class="transcript-section-actions">
                  <button id="transcriptViewMode" class="transcript-view-btn" type="button"></button>
                  <span class="transcript-section-meta" id="transcriptTimelineCount"></span>
                </div>
              </div>
              <div class="transcript-feed" id="transcriptTimeline"></div>
            </section>

            <section class="transcript-section">
              <div class="transcript-section-header">
                <h3 data-i18n="transcriptRawTitle"></h3>
              </div>
              <div class="transcript-provider-list" id="transcriptProviderList"></div>
            </section>
          </div>
        </aside>
      </section>
      <button id="transcriptDock" class="transcript-dock" type="button" data-i18n="transcriptDockLabel"></button>

      <footer class="composer">
        <div class="composer-targets" id="targetChips"></div>
        <div class="composer-left">
          <textarea id="prompt" data-i18n-attr="placeholder" data-i18n="composerPlaceholder"></textarea>
          <div class="composer-hint" id="shortcutHint"></div>
        </div>
        <div class="composer-right">
          <button id="sendAll" class="primary" data-i18n="sendAll">
          </button>
        </div>
      </footer>
    </div>

    <template id="panelTemplate">
      <section class="panel">
        <div class="panel-header">
          <div class="panel-title"></div>
          <div class="panel-header-actions">
            <!-- Badge moved to title -->
          </div>
        </div>
        <div class="panel-body">
          <iframe class="panel-frame" allow="clipboard-read; clipboard-write" color-scheme="light"></iframe>
        </div>
      </section>
    </template>

    <script src="providers.js"></script>
    <script src="favicon-cache.js"></script>
    <script src="dashboard-focus.js"></script>
    <script src="dashboard/i18n.js"></script>
    <script src="dashboard/shared-state.js"></script>
    <script src="dashboard/transcript.js"></script>
    <script src="dashboard/grid-resizer.js"></script>
    <script src="dashboard/send.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
