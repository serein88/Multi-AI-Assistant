<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Multi AI Assistant</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>Multi AI Assistant</h1>
      <p>通过扩展统一管理会话窗口与恢复入口。</p>
    </header>

    <section class="card">
      <div class="card-head">
        <h2>新建会话</h2>
        <label class="toggle">
          <input id="backgroundMode" type="checkbox" />
          <span>后台创建</span>
        </label>
      </div>
      <p class="hint">会为 DeepSeek、Gemini、Grok 打开一个受管会话窗口。</p>
      <button id="createSession" class="primary">新建会话</button>
    </section>

    <section class="card">
      <div class="card-head">
        <h2>恢复对话</h2>
        <button id="loadSessions" class="ghost" type="button">刷新列表</button>
      </div>
      <p class="hint">查看历史会话并恢复可继续的子会话。</p>
      <div id="emptyState" class="empty">还没有已保存会话。</div>
      <div id="sessionList" class="session-list"></div>
    </section>

    <section id="restorePanel" class="card hidden">
      <div class="card-head">
        <h2>恢复确认</h2>
        <button id="closeRestorePanel" class="ghost" type="button">返回</button>
      </div>
      <div id="restoreSummary" class="restore-summary"></div>
      <div class="actions">
        <button id="confirmRestore" class="primary" type="button">恢复会话</button>
      </div>
    </section>

    <section id="status" class="status" aria-live="polite"></section>

    <script src="popup.js"></script>
  </body>
</html>
